workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Extract project
        script: |
          unzip -o Kimi_Agent_完整Flutter.zip
      - name: Remove offline AI
        script: |
          cd life_manager_app
          python3 -c "
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          content = content.replace('flutter_gemma: ^0.0.5', '').replace('flutter_gemma: ^0.12.5', '')
          with open('pubspec.yaml', 'w') as f:
              f.write(content)
          "
          cat > lib/services/local_ai_service.dart << 'EOF'
          class LocalAIService {
            static final LocalAIService _instance = LocalAIService._internal();
            factory LocalAIService() => _instance;
            LocalAIService._internal();
            bool _isReady = false;
            bool get isReady => _isReady;
            Future<bool> isModelDownloaded() async => false;
            Future<void> init() async {}
            Future<String> generate(String prompt) async =>
                'Offline AI coming soon. Please connect to internet to use AI.';
            void dispose() {}
          }
          EOF
      - name: Get Flutter packages
        script: |
          cd life_manager_app
          flutter pub get
      - name: Build APK
        script: |
          cd life_manager_app
          flutter build apk --release
    artifacts:
      - life_manager_app/build/app/outputs/flutter-apk/app-release.apk