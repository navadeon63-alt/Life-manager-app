workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Extract project
        script: |
          ls -la
          unzip -o "Kimi_Agent_Flutter_Finance_Tracker_App.zip"
      - name: Get Flutter packages
        script: |
          cd finance_manager_app
          flutter pub get
      - name: Build APK
        script: |
          cd finance_manager_app
          flutter build apk --release
    artifacts:
      - finance_manager_app/build/app/outputs/flutter-apk/app-release.apk 