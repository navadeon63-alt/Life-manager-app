workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Extract project
        script: |
          unzip -o "Kimi_Agent_Flutter Finance Tracker App.zip"
          python3 -c "open('finance_manager_app/pubspec.yaml','w').write(open('finance_manager_app/pubspec.yaml').read().replace('flutter_local_notifications: ^17.2.1','flutter_local_notifications: ^16.3.3'))"
      - name: Get Flutter packages
        script: |
          cd finance_manager_app
          flutter pub get
      - name: Build APK
        script: |
          cd finance_manager_app
          flutter build apk --release
    artifacts:
      - finance_manager_app/build/app/outputs/flutter-apk/app-release.apk