workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Extract project
        script: |
          unzip -o Kimi_Agent_完整Flutter.zip
          ls -la
          ls -la life_manager_app/
      - name: Get Flutter packages
        script: |
          cd life_manager_app
          flutter pub get
      - name: Build APK
        script: |
          cd life_manager_app
          flutter build apk --release
    artifacts:
      - life_manager_app/build/app/outputs/flutter-apk/app-release.apk 