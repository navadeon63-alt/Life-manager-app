workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Extract project
        script: |
          unzip -o Kimi_Agent_完整Flutter.zip
      - name: Fix flutter_gemma version
        script: |
          cd life_manager_app
          python3 -c "
          import re
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          content = re.sub(r'flutter_gemma:.*', 'flutter_gemma: ^0.12.5', content)
          with open('pubspec.yaml', 'w') as f:
              f.write(content)
          "
      - name: Copy fixed local_ai_service
        script: |
          cp local_ai_service.dart life_manager_app/lib/services/local_ai_service.dart
      - name: Get Flutter packages
        script: |
          cd life_manager_app
          flutter pub get
      - name: Build APK
        script: |
          cd life_manager_app
          flutter build apk --release
    artifacts:
      - life_manager_app/build/app/outputs/flutter-apk/app-release.apk