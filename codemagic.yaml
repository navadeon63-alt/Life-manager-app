workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Extract project
        script: |
          unzip -o Kimi_Agent_完整Flutter.zip
      - name: Fix flutter_gemma version
        script: |
          cd life_manager_app
          sed -i 's/flutter_gemma: .*/flutter_gemma: ^0.12.5/' pubspec.yaml
      - name: Get Flutter packages
        script: |
          cd life_manager_app
          flutter pub get
      - name: Build APK
        script: |
          cd life_manager_app
          flutter build apk --release
    artifacts:
      - life_manager_app/build/app/outputs/flutter-apk/app-release.apk 